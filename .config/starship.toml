[shlvl]
disabled = false
threshold = 2
symbol = ''
style = 'color_shlvl'
format = '[ $symbol$shlvl]($style)'


[username]
disabled = false
style_user = 'bold color_user'
style_root = 'bold bright-yellow'
format = '[ $user]($style)'
aliases = { 'Administrator' = '󰢏 ' }


[hostname]
disabled = false
ssh_symbol = '󰌗 '
style = 'color_ssh'
format = '[@$hostname]($style)'

[localip]
disabled = true
style = 'color_ssh'
format = '[@$localipv4]($style)'


[directory]
disabled = false
style = 'yellow'
read_only = '󰌾 '
read_only_style = 'red'
format = '[   ]($style)[$path ]()[$read_only]($read_only_style)'
truncate_to_repo = true
truncation_length = 6
truncation_symbol = '…/'

[directory.substitutions]
'Documents' = '󰈙 '
'Downloads' = ' '
'Music' = ' '
'Pictures' = ' '
'Developer' = '󰲋 '


[fill]
# disabled = true
# '    '
# ' · '
symbol = ' · '
style = 'color_fill'


